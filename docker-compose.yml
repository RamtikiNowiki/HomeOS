name: home-os-hub

services:
  web:
    build: .
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-homeos}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-homeos}
      # User profiles created by the idempotent seed on first boot
      SEED_USER1_USERNAME: ${SEED_USER1_USERNAME:-ram}
      SEED_USER1_NAME: ${SEED_USER1_NAME:-Ram}
      SEED_USER1_PASSWORD: ${SEED_USER1_PASSWORD:?Set SEED_USER1_PASSWORD in .env}
      SEED_USER2_USERNAME: ${SEED_USER2_USERNAME:-tiki}
      SEED_USER2_NAME: ${SEED_USER2_NAME:-Tiki}
      SEED_USER2_PASSWORD: ${SEED_USER2_PASSWORD:?Set SEED_USER2_PASSWORD in .env}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-1}
      # Future integrations (leave empty for mock mode)
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      CREALITY_K2_HOST: ${CREALITY_K2_HOST:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-homeos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
    driver: bridge

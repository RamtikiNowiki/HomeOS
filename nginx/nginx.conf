# Reverse proxy for the Home OS & Fitness Hub.
# Mounted into the nginx container as /etc/nginx/conf.d/default.conf

upstream flask_app {
    server web:8000;
    keepalive 16;
}

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Moonraker / printer API polling — allow longer reads
    location ~ ^/printer/api/ {
        proxy_pass http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 30s;
    }

    # PWA — service worker + manifest (no long cache on SW)
    location = /sw.js {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location = /manifest.webmanifest {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /static/ {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    location / {
        proxy_pass http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }
}

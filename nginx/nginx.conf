# Reverse proxy for the Home OS & Fitness Hub.
# Mounted into the nginx container as /etc/nginx/conf.d/default.conf

upstream flask_app {
    server web:8000;
    keepalive 16;
}

# Honor X-Forwarded-Proto if we ever sit behind another proxy / TLS terminator
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    # Reasonable defaults for a Raspberry Pi
    client_max_body_size 10m;
    keepalive_timeout 65;

    # Compression — big win for HTML/CSS/JS over gym wifi
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /static/ {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Static assets are immutable enough to cache aggressively
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    location / {
        proxy_pass http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }
}
